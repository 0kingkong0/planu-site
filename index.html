<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanU — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --coral: #EC8C68;
            --indigo: #6675A5;
            --mauve: #D8A897;
            --cream: #FBEFE4;
            --ink: #1C1008;
            --peach: #F0C1A3;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated gradient orb in background */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--peach) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            opacity: 0.15;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 4rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            animation: fadeUp 1s ease-out;
        }

        .logo-text span {
            color: var(--coral);
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.25rem;
            color: var(--indigo);
            margin-bottom: 2rem;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--coral);
            border-radius: 2px;
            margin: 0 auto 2rem;
            animation: fadeUp 1s ease-out 0.4s both;
        }

        .message {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--ink);
            opacity: 0.8;
            margin-bottom: 2.5rem;
            animation: fadeUp 1s ease-out 0.6s both;
        }

        .badge {
            display: inline-block;
            background: var(--coral);
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.6rem 1.5rem;
            border-radius: 100px;
            animation: fadeUp 1s ease-out 0.8s both;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: var(--mauve);
            z-index: 1;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 2.75rem; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">Plan<span>U</span></div>
        <p class="tagline">Your semester, organized in 60 seconds.</p>
        <div class="divider"></div>
        <p class="message">
            We're building something that turns your messy syllabi into a clear semester plan — automatically.
            <br><br>
            Launching soon at the University of Windsor and beyond.
        </p>
        <div class="badge">Coming Soon</div>
    </div>
    <div class="footer">© 2026 PlanU · planu.ca</div>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
