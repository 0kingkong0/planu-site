<script>
  (function () {
    const nav        = document.getElementById('main-nav');
    const menuBtn    = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    window.addEventListener('scroll', function () {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    menuBtn.addEventListener('click', function () {
      const isOpen = mobileMenu.classList.toggle('open');
      menuBtn.classList.toggle('open', isOpen);
    });

    document.querySelectorAll('a[data-scroll]').forEach(function (link) {
      link.addEventListener('click', function (e) {
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          mobileMenu.classList.remove('open');
          menuBtn.classList.remove('open');
        }
      });
    });
  })();

        @keyframes ditherFlow {
            0% { background-position: 0 0, 0 0, 0 0, 0 0; }
            50% { background-position: -28px 18px, 34px -22px, -20px -34px, 40px 22px; }
            100% { background-position: -56px 36px, 68px -44px, -40px -68px, 80px 44px; }
        }
        .dark-dither-surface {
            position: relative;
            isolation: isolate;
        }
        .dark-dither-surface > * {
            position: relative;
            z-index: 1;
        }
        .dark-dither-surface::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.34;
            background-image:
                radial-gradient(circle at 20% 15%, rgba(236,140,104,0.34) 0%, transparent 42%),
                radial-gradient(circle at 82% 78%, rgba(102,117,165,0.22) 0%, transparent 38%),
                repeating-radial-gradient(
                    circle at 0 0,
                    rgba(236,140,104,0.22) 0 1px,
                    transparent 1px 4px
                ),
                repeating-linear-gradient(
                    45deg,
                    rgba(251,239,228,0.06) 0 1px,
                    transparent 1px 3px
                );
            mix-blend-mode: soft-light;
            animation: ditherFlow 16s linear infinite;
        }
        .dark-dither-surface::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(140deg, rgba(236,140,104,0.12) 0%, transparent 50%, rgba(102,117,165,0.12) 100%);
        }
        .dark-dither-surface:hover::before {
            opacity: 0.4;
            animation-duration: 12s;
        }
        .dither-strong {
            background-image:
                radial-gradient(circle at 15% 20%, rgba(236,140,104,0.2) 0%, transparent 38%),
                radial-gradient(circle at 80% 75%, rgba(236,140,104,0.14) 0%, transparent 36%),
                repeating-radial-gradient(
                    circle at center,
                    rgba(236,140,104,0.2) 0 1px,
                    transparent 1px 4px
                ),
                linear-gradient(180deg, rgba(20,10,6,0.2) 0%, rgba(0,0,0,0.18) 100%);
            background-size: 100% 100%, 100% 100%, 8px 8px, 100% 100%;
            background-blend-mode: screen, screen, soft-light, normal;
            animation: ditherFlow 14s linear infinite;
        }
        .dither-strong::before {
            opacity: 0.52;
        }
        .dither-strong::after {
            background: linear-gradient(140deg, rgba(236,140,104,0.16) 0%, transparent 50%, rgba(236,140,104,0.12) 100%);
        }
        .how-step.pdf-highlight {
            border: 1px solid rgba(236,140,104,0.22);
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(251,239,228,0.03) 0%, rgba(251,239,228,0.02) 100%);
        }
        .how-step.pdf-highlight .step-icon {
            background: rgba(236,140,104,0.18);
            box-shadow: 0 10px 24px rgba(236,140,104,0.15);
        }

        /* ═══════════════════════════════════════════
           SECTION: HOW IT WORKS
           ═══════════════════════════════════════════ */
        .how-section {
            padding: var(--section-pad) 0;
            background: var(--ink);
            color: var(--cream);
            position: relative;
            overflow: hidden;
        }
        .how-section::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo-deep) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            opacity: 0.2;
        }

        .how-section .section-heading { color: var(--cream); }
        .how-section .section-sub { color: rgba(251,239,228,0.5); }

        .how-steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            position: relative;
            z-index: 1;
        }

        .how-step {
            text-align: center;
            padding: 40px 24px;
            position: relative;
        }

        .step-number {
            font-weight: 900;
            font-size: 4.5rem;
            color: rgba(236,140,104,0.12);
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.04em;
        }

        .step-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(236,140,104,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .step-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 10px;
        }
        .step-desc {
            font-size: 0.88rem;
            color: rgba(251,239,228,0.5);
            line-height: 1.6;
        }
        .step-time {
            display: inline-block;
            margin-top: 16px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--coral);
            letter-spacing: 0.06em;
        }

        /* Connector lines between steps */
        .how-connector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: -16px 0 20px;
            position: relative;
            z-index: 1;
        }
        .connector-line {
            flex: 1;
            height: 1px;
            background: rgba(236,140,104,0.2);
            max-width: 120px;
        }

        /* ═══════════════════════════════════════════
           SECTION: FEATURES
           ═══════════════════════════════════════════ */
        .features-section {
            padding: var(--section-pad) 0;
            position: relative;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .feature-card {
            background: var(--white);
            border-radius: 16px;
            padding: 36px 32px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
        }
        .feature-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(28,16,8,0.06);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .feature-icon.coral-bg { background: rgba(236,140,104,0.1); }
        .feature-icon.indigo-bg { background: rgba(102,117,165,0.1); }
        .feature-icon.mauve-bg { background: rgba(216,168,151,0.12); }
        .feature-icon.peach-bg { background: rgba(240,193,163,0.15); }

        .feature-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .feature-desc {
            font-size: 0.85rem;
            color: var(--ink-light);
            line-height: 1.6;
        }
        .feature-tag {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(102,117,165,0.08);
            color: var(--indigo);
        }

        /* ═══════════════════════════════════════════
           SECTION: HIGH SCHOOL
           ═══════════════════════════════════════════ */
        .hs-section {
            padding: var(--section-pad) 0;
            background: var(--ink);
            color: var(--cream);
            position: relative;
            overflow: hidden;
        }
        .hs-section::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--coral) 0%, transparent 70%);
            bottom: -400px;
            left: -200px;
            opacity: 0.06;
        }
        .hs-section::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            opacity: 0.1;
        }

        .hs-section .section-heading { color: var(--cream); }
        .hs-section .section-sub { color: rgba(251,239,228,0.5); }

        .hs-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            margin-bottom: 64px;
            position: relative;
            z-index: 1;
        }
        .hs-top-content { max-width: 520px; }

        .hs-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(102,117,165,0.15);
            border: 1px solid rgba(102,117,165,0.25);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--indigo-light);
            margin-bottom: 24px;
        }

        .hs-pillars {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .hs-pillar {
            background: rgba(251,239,228,0.04);
            border: 1px solid rgba(251,239,228,0.08);
            border-radius: 16px;
            padding: 32px 28px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s;
        }
        .hs-pillar:hover {
            transform: translateY(-4px);
            border-color: rgba(236,140,104,0.3);
        }

        .hs-pillar-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(236,140,104,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        .hs-pillar-icon.indigo { background: rgba(102,117,165,0.15); }
        .hs-pillar-icon.mauve { background: rgba(216,168,151,0.12); }

        .hs-pillar-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 8px;
            color: var(--cream);
        }
        .hs-pillar-desc {
            font-size: 0.85rem;
            color: rgba(251,239,228,0.45);
            line-height: 1.6;
        }
        .hs-pillar-tag {
            display: inline-block;
            margin-top: 14px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(236,140,104,0.12);
            color: var(--coral-glow);
        }

        /* Coach mockup card */
        .coach-mockup {
            background: rgba(251,239,228,0.05);
            border: 1px solid rgba(251,239,228,0.1);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            z-index: 1;
        }
        .coach-mockup-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--coral-glow);
            margin-bottom: 16px;
        }
        .coach-bubble {
            background: rgba(251,239,228,0.06);
            border: 1px solid rgba(251,239,228,0.08);
            border-radius: 12px 12px 12px 4px;
            padding: 16px 20px;
            margin-bottom: 12px;
            max-width: 90%;
        }
        .coach-bubble p {
            font-size: 0.82rem;
            color: rgba(251,239,228,0.7);
            line-height: 1.6;
        }
        .coach-bubble strong {
            color: var(--coral-glow);
            font-weight: 600;
        }
        .coach-bubble.user {
            background: rgba(236,140,104,0.1);
            border-color: rgba(236,140,104,0.2);
            border-radius: 12px 12px 4px 12px;
            margin-left: auto;
            max-width: 75%;
        }
        .coach-bubble.user p { color: rgba(251,239,228,0.8); }

        .coach-task-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(102,117,165,0.12);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--indigo-light);
            margin-top: 6px;
        }

        /* Pipeline visual */
        .hs-pipeline {
            margin-top: 56px;
            padding-top: 48px;
            border-top: 1px solid rgba(251,239,228,0.06);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .hs-pipeline-title {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--cream);
            margin-bottom: 8px;
        }
        .hs-pipeline-sub {
            font-size: 0.82rem;
            color: rgba(251,239,228,0.4);
            max-width: 520px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        .pipeline-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pipeline-step {
            background: rgba(251,239,228,0.04);
            border: 1px solid rgba(251,239,228,0.1);
            border-radius: 12px;
            padding: 16px 22px;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(251,239,228,0.6);
            transition: border-color 0.3s, color 0.3s;
        }
        .pipeline-step:hover {
            border-color: rgba(236,140,104,0.3);
            color: var(--cream);
        }
        .pipeline-step.active {
            background: rgba(236,140,104,0.1);
            border-color: rgba(236,140,104,0.3);
            color: var(--coral-glow);
        }
        .pipeline-arrow {
            color: rgba(251,239,228,0.15);
            font-size: 1.2rem;
        }

        @media (max-width: 1024px) {
            .hs-top { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .hs-pillars { grid-template-columns: 1fr; }
            .pipeline-flow { flex-direction: column; }
            .pipeline-arrow { transform: rotate(90deg); }
        }

        /* ═══════════════════════════════════════════
           SECTION: SOCIAL PROOF
           ═══════════════════════════════════════════ */
        .proof-section {
            padding: var(--section-pad) 0;
            background: linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 100%);
        }

        .proof-section .container {
            text-align: center;
        }

        .quote-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 48px;
        }

        .quote-card {
            background: var(--white);
            border-radius: 16px;
            padding: 32px 28px;
            text-align: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .quote-card:hover { transform: translateY(-4px); }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--coral);
            line-height: 1;
            margin-bottom: 8px;
        }
        .quote-text {
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--ink-muted);
            font-style: italic;
            margin-bottom: 16px;
        }
        .quote-source {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ═══════════════════════════════════════════
           SECTION: SEMESTER VISUAL
           ═══════════════════════════════════════════ */
        .semester-visual-section {
            padding: var(--section-pad) 0;
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 100%);
        }
        .semester-visual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 36px;
            align-items: center;
        }
        .semester-visual-copy .section-heading,
        .semester-visual-copy .section-sub {
            margin-left: 0;
            text-align: left;
        }
        .visual-points {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
        .visual-point {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(28,16,8,0.08);
            color: var(--ink-muted);
            font-size: 0.76rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .visual-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--coral);
        }
        .semester-glass {
            background: rgba(251, 239, 228, 0.62);
            border: 1px solid rgba(28,16,8,0.08);
            border-radius: 26px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(28,16,8,0.1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .semester-glass-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .semester-pill {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--ink-light);
        }
        .semester-chips {
            display: flex;
            gap: 8px;
        }
        .semester-chip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            opacity: 0.8;
        }
        .semester-chip.red { background: #f16b6b; }
        .semester-chip.gold { background: #ebb35b; }
        .semester-chip.green { background: #55ba87; }
        .mini-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .mini-day {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 1px solid rgba(28,16,8,0.08);
            background: rgba(255,255,255,0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--ink-muted);
            position: relative;
        }
        .mini-day.hot {
            background: rgba(236,140,104,0.25);
            border-color: rgba(236,140,104,0.35);
            color: var(--ink);
        }
        .mini-day.exam::after {
            content: '';
            position: absolute;
            bottom: 7px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--indigo);
        }
        .semester-task {
            background: rgba(255,255,255,0.84);
            border: 1px solid rgba(28,16,8,0.08);
            border-left: 4px solid var(--coral);
            border-radius: 14px;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .semester-task:last-child { margin-bottom: 0; }
        .semester-task-title {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--ink);
        }
        .semester-task-meta {
            font-size: 0.72rem;
            color: var(--ink-light);
        }
        .semester-task-weight {
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--coral-deep);
            white-space: nowrap;
        }

       /* ═══════════════════════════════════════════
           SECTION: COMPETITIVE EDGE TABLE (UPDATED — DARK HEADER)
           ═══════════════════════════════════════════ */
        .edge-section { padding: var(--section-pad) 0; }
 
        .edge-table-wrap {
            background: var(--white);
            border: 1px solid rgba(28,16,8,0.08);
            border-radius: 20px;
            overflow: auto;
            box-shadow: 0 12px 30px rgba(28,16,8,0.06);
        }
 
        .edge-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }
 
        /* Dark header row */
        .edge-table thead tr {
            background: var(--ink);
        }
        .edge-table th {
            text-align: left;
            padding: 20px 28px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: none;
        }
        .edge-table th:nth-child(1),
        .edge-table th:nth-child(2) {
            color: rgba(251,239,228,0.55);
        }
        /* "PLANU'S ANSWER" column header in coral */
        .edge-table th:nth-child(3) {
            color: var(--coral);
        }
        /* Rounded corners on the header */
        .edge-table thead tr th:first-child {
            border-radius: 12px 0 0 0;
        }
        .edge-table thead tr th:last-child {
            border-radius: 0 12px 0 0;
        }
 
        .edge-table td {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(28,16,8,0.06);
            font-size: 0.88rem;
            color: var(--ink-light);
            line-height: 1.55;
        }
        .edge-table tr:last-child td { border-bottom: 0; }
        .edge-table td:first-child {
            font-weight: 700;
            color: var(--ink);
            white-space: nowrap;
        }
        /* Third column (PlanU's answer) — normal weight but ink color */
        .edge-table td:nth-child(3) {
            color: var(--ink-muted);
            font-weight: 600;
        }
        .edge-answer {
            color: var(--coral-deep);
            font-weight: 700;
        }
        /* ═══════════════════════════════════════════
           SECTION: TRUST / PRIVACY
           ═══════════════════════════════════════════ */
        .trust-section {
            padding: var(--section-pad) 0;
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .trust-item {
            text-align: center;
            padding: 28px 16px;
        }
        .trust-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(102,117,165,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }
        .trust-title {
            font-weight: 700;
            font-size: 0.88rem;
            margin-bottom: 6px;
        }
        .trust-desc {
            font-size: 0.78rem;
            color: var(--ink-light);
            line-height: 1.5;
        }

        /* ═══════════════════════════════════════════
           SECTION: CTA / EMAIL
           ═══════════════════════════════════════════ */
        .cta-section {
            padding: var(--section-pad) 0;
            position: relative;
            overflow: hidden;
        }

        .cta-card {
            background: var(--ink);
            border-radius: 24px;
            padding: clamp(48px, 8vw, 80px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .cta-card::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--coral) 0%, transparent 70%);
            top: -250px;
            right: -150px;
            opacity: 0.1;
        }
        .cta-card::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo) 0%, transparent 70%);
            bottom: -200px;
            left: -100px;
            opacity: 0.08;
        }

    <!-- ═══════ SCRIPTS ═══════ -->
    <script>
        // ── Nav scroll effect ──
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.classList.toggle('scrolled', window.scrollY > 40);
        });

        // ── Scroll reveal observer ──
        const revealEls = document.querySelectorAll('.reveal');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

        revealEls.forEach(el => revealObserver.observe(el));

        // ── Smooth anchor scroll ──
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    </script>
